<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秋分书城 - 高级数字展销平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 全局样式 */
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --light-color: #ecf0f1;
            --dark-color: #34495e;
            --shadow-light: 0 4px 12px rgba(0, 0, 0, 0.1);
            --shadow-medium: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-heavy: 0 15px 40px rgba(0, 0, 0, 0.2);
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fast: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            perspective: 1000px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 页头样式 - 高级版 */
        header {
            background: linear-gradient(135deg, var(--secondary-color), var(--dark-color));
            color: white;
            padding: 15px 0;
            box-shadow: var(--shadow-heavy);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            flex-direction: column;
            transform-style: preserve-3d;
        }

        .logo h1 {
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 实时时钟样式 */
        .live-clock {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: var(--transition-fast);
        }

        .live-clock:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 搜索区域样式 */
        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 30px;
            position: relative;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-medium);
            transition: var(--transition-smooth);
            transform-style: preserve-3d;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3), var(--shadow-medium);
            transform: translateY(-2px) translateZ(20px);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 18px;
        }

        /* 3D图书翻转效果 */
        .book-flip-container {
            perspective: 1000px;
            width: 100%;
            height: 100%;
        }

        .book-flip {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: var(--transition-smooth);
        }

        .book-flip:hover {
            transform: rotateY(180deg);
        }

        .book-front, .book-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            overflow: hidden;
        }

        .book-front {
            background: white;
            display: flex;
            flex-direction: column;
        }

        .book-back {
            background: linear-gradient(135deg, var(--secondary-color), var(--dark-color));
            color: white;
            transform: rotateY(180deg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        /* 图书卡片样式 */
        .book-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow-medium);
            transition: var(--transition-smooth);
            transform-style: preserve-3d;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-10px) translateZ(20px);
            box-shadow: var(--shadow-heavy);
        }

        .book-image-container {
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .book-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .book-card:hover .book-image {
            transform: scale(1.05);
        }

        .book-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 2;
        }

        .book-info {
            padding: 20px;
        }

        .book-title {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--dark-color);
            font-weight: 600;
        }

        .book-author {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .book-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .book-price {
            color: var(--accent-color);
            font-size: 20px;
            font-weight: bold;
        }

        .book-rating {
            color: #f39c12;
        }

        .book-actions {
            display: flex;
            gap: 10px;
        }

        /* 主内容区 */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            gap: 30px;
            padding: 0 20px;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr 2fr;
            }
            
            .right-col {
                grid-column: 1 / -1;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                display: grid;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .search-container {
                width: 100%;
                margin: 10px 0;
            }
            
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 页头 -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1><i class="fas fa-book-open"></i> 秋分书城</h1>
                <p>高级数字展销平台</p>
            </div>
            
            <!-- 实时时钟 -->
            <div class="live-clock">
                <i class="fas fa-clock"></i>
                <span id="currentTime">2023-11-15 14:30:45</span>
            </div>
            
            <!-- 智能图书搜索框 -->
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" placeholder="搜索图书、作者或分类..." autocomplete="off">
                </div>
            </div>
            
            <!-- 登录表单入口 -->
            <div class="auth-section">
                <div class="auth-buttons">
                    <button class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container">
        <!-- 中间内容区 -->
        <section class="middle-col">
            <!-- 图书网格 -->
            <div class="books-grid">
                <!-- 图书卡片示例1 - 带翻转效果 -->
                <div class="book-card">
                    <div class="book-flip-container">
                        <div class="book-flip">
                            <div class="book-front">
                                <div class="book-image-container">
                                    <img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" 
                                         alt="JavaScript高级程序设计" class="book-image">
                                    <span class="book-badge">热销</span>
                                </div>
                                <div class="book-info">
                                    <h3 class="book-title">JavaScript高级程序设计</h3>
                                    <p class="book-author">Nicholas C. Zakas</p>
                                    <div class="book-meta">
                                        <div class="book-price">¥89.90</div>
                                        <div class="book-rating">
                                            <i class="fas fa-star"></i> 4.7
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="book-back">
                                <h3>JavaScript高级程序设计</h3>
                                <p>前端开发必读经典</p>
                                <div class="book-price">¥89.90</div>
                                <div class="book-rating">
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star-half-alt"></i>
                                    <span>4.7 (1,245评价)</span>
                                </div>
                                <button class="btn btn-primary">加入购物车</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 图书卡片示例2 -->
                <div class="book-card">
                    <div class="book-flip-container">
                        <div class="book-flip">
                            <div class="book-front">
                                <div class="book-image-container">
                                    <img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" 
                                         alt="Python编程从入门到实践" class="book-image">
                                    <span class="book-badge">新品</span>
                                </div>
                                <div class="book-info">
                                    <h3 class="book-title">Python编程从入门到实践</h3>
                                    <p class="book-author">Eric Matthes</p>
                                    <div class="book-meta">
                                        <div class="book-price">¥75.50</div>
                                        <div class="book-rating">
                                            <i class="fas fa-star"></i> 4.9
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="book-back">
                                <h3>Python编程从入门到实践</h3>
                                <p>零基础Python学习指南</p>
                                <div class="book-price">¥75.50</div>
                                <div class="book-rating">
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <span>4.9 (2,034评价)</span>
                                </div>
                                <button class="btn btn-primary">加入购物车</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 实时时钟功能
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const timeString = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            document.getElementById('currentTime').textContent = timeString;
        }

        // 初始化时钟并每秒更新
        updateClock();
        setInterval(updateClock, 1000);

        // 3D翻转效果初始化
        document.querySelectorAll('.book-flip').forEach(flip => {
            flip.addEventListener('mouseenter', function() {
                this.style.transition = 'transform 0.6s ease';
            });
            
            flip.addEventListener('mouseleave', function() {
                this.style.transition = 'transform 0.6s ease';
            });
        });
    </script>
</body>
</html>
